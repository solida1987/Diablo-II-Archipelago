;   RowHeight   = vertical pixel height per milestone row
;   DiffGapY    = legacy padding (unused by current vertical layout)
;
; Markers: "+" = milestone reached, "-" = pending. Earlier code
; used Unicode glyphs (U+2713 / U+00B7) which D2's bitmap font
; rendered as garbage like "Å." — switched to plain ASCII.
; ----------------------------------------------------------------
