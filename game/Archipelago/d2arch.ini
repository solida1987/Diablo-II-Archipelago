;
; This file is loaded LIVE: edit any value, save, and the change
; appears in-game within about 500 ms. No relog needed (except
; for [settings] toggles that are frozen at character creation).
;
; Sections are GROUPED BY SCREEN. To find something to move,
; jump to the screen banner with text-search:
;
;   "TITLE SCREEN"     -> the main menu before you enter the game
;   "F1 SHARED"        -> book frame, top tab bar, Next/Back buttons
;   "F1 PAGE 0"        -> Skill Editor      (NOTE: page 0 keys still
;                                            require relog to apply)
;   "F1 PAGE 1"        -> Overview (Logbook-style summary)
;   "F1 PAGE 2"        -> Quests (act/filter/diff tabs + list + detail)
;   "F1 PAGE 3"        -> Zones (folded F4 zone tracker)
;   "F1 PAGES 4-5"     -> Collection: Sets I + II
;   "F1 PAGE 6"        -> Collection: Runes
;   "F1 PAGE 7"        -> Collection: Gems
;   "F1 PAGE 8"        -> Collection: Specials & Gold
;   "F1 PAGE 9"        -> Logbook (Statistics)
;   "F1 PAGE 10"       -> AP Connection + Item Log
;   "F2 QUEST LOG"     -> the F2 panel
;   "F3 TRACKER"       -> in-game overlay + notifications
;   "F4 ZONES MODAL"   -> standalone fallback for the folded F1 page
;   "F8 STASH"         -> stash / skill tree panels
;
; Section headers look like  [Section]  and contain  Name=Value
; lines. Lines starting with `;` are comments — safe to delete or
; edit. NEVER rename a section header (the DLL hardcodes them).
;
; ================================================================


