; ███                                                          ███
; ████████████████████████████████████████████████████████████████

[Notifications]
; Floating gold notification text (quest rewards, skill assignments,
; check-fired toasts) — rendered at screen-center-X, NotifyY pixels
; from top.
NotifyY=80
; Big red warning (Treasure Cow spawned, etc.) — rendered relative
; to screen center. Negative Y = above center, positive = below.
BigWarnOffsetY=-40
; Big warning visible duration (milliseconds). Default 5000 = 5 sec.
BigWarnDurationMs=5000


