[paths]
; Path to Diablo II Save directory (where .d2s files are stored)
; This is set automatically by the installer based on where the user's game is installed.
; Example: C:\Program Files (x86)\Diablo II\Save\
; Leave empty to auto-detect from Windows Registry.
SavePath=

; Path to original Diablo II installation (where MPQ files are)
; This is set automatically by the installer.
; Example: C:\Program Files (x86)\Diablo II\
GamePath=

[ap]
; Archipelago server settings (can also be changed in-game)
ServerIP=archipelago.gg:49893
SlotName=test
Password=

[settings]
; Standalone mode settings
; GoalScope: 0=Act1, 1=Act1-2, 2=Act1-3, 3=Act1-4, 4=Act1-5, 5=Normal+NM, 6=Full Game
GoalScope=4
; Quest categories (1=enabled, 0=disabled)
